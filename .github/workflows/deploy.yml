name: Deploy SUKSAI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static files
        run: |
          mkdir -p _site
          if [ -f "index.html" ]; then
            cp index.html _site/
          elif [ -f "suksai/index.html" ]; then
            cp suksai/index.html _site/
          fi
          sed -i 's|href="/|href="./|g' _site/index.html
          sed -i 's|src="/|src="./|g'  _site/index.html
          [ -d "public" ]        && cp -r public/. _site/
          [ -d "suksai/public" ] && cp -r suksai/public/. _site/
          find . -maxdepth 1 -name "*.css" -exec cp {} _site/ \;
          find . -maxdepth 1 -name "*.js"  -exec cp {} _site/ \;
          find . -maxdepth 1 -name "*.jpg" -exec cp {} _site/ \;
          find . -maxdepth 1 -name "*.png" -exec cp {} _site/ \;
          find . -maxdepth 1 -name "*.svg" -exec cp {} _site/ \;
          ls -lh _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
